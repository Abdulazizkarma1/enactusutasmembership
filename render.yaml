services:
  # Backend Web Service
  - type: web
    name: enactus-verify-api
    env: node
    rootDir: server/
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_URL
        fromService:
          type: web
          name: enactus-verify-web
          property: url
      - key: MONGODB_URI
        sync: false  # Set manually to Atlas URI

  # Frontend Static Site
  - type: web
    name: enactus-verify-web
    env: static
    rootDir: client/
    buildCommand: npm install && npm run build
    outputDir: build/
    headers:
      - path: /*
        headers:
          - key: X-Frame-Options
            value: DENY
